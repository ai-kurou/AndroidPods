name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'バージョン番号 (例: 1.2.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # リリース作成 + main へのpushに必要

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Set version
        run: |
          echo "VERSION_NAME=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          echo "VERSION_CODE=$GITHUB_RUN_NUMBER" >> $GITHUB_ENV

      - name: Update versionName and versionCode
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to $VERSION_NAME [skip ci]"
          git push origin main

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json

      - name: Restore keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/androidpods.jks

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          STORE_FILE=app/androidpods.jks
          STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/androidpods-${VERSION_NAME}.apk

      - name: Create GitHub Release
        run: |
          gh release create "v$VERSION_NAME" \
            --title "Release v$VERSION_NAME" \
            --generate-notes \
            app/build/outputs/apk/release/androidpods-${VERSION_NAME}.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
