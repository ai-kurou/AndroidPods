name: Pull Request

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      # signingConfigs の定義に local.properties が必要だが、
      # このジョブはテスト・カバレッジのみで署名は実行しないため
      # ダミー値で問題ない。実際の署名はリリースワークフローで行う。
      - name: Create local.properties
        run: |
          echo "STORE_FILE=app/androidpods.jks" >> local.properties
          echo "STORE_PASSWORD=placeholder" >> local.properties
          echo "KEY_ALIAS=placeholder" >> local.properties
          echo "KEY_PASSWORD=placeholder" >> local.properties

      - run: ./gradlew koverXmlReport

      - uses: codecov/codecov-action@v5
        with:
          files: build/reports/kover/report.xml

  instrumented-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest
